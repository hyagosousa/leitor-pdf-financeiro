<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Analisador de Balancete</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ffcc;
    }

    input {
      margin: 20px;
      padding: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      background: #00aa88;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #00ccaa;
    }

    .box {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }

    .coluna {
      width: 45%;
      padding: 15px;
      border-radius: 10px;
    }

    .positivo {
      background: #063;
    }

    .negativo {
      background: #600;
    }

    li {
      margin: 8px 0;
      text-align: left;
    }
  </style>
</head>

<body>

<h1>📄 Analisador de Balancete</h1>

<input type="file" id="pdfInput" multiple accept="application/pdf">
<br>
<button onclick="baixarNegativos()">⬇️ Baixar PDFs Negativos</button>

<div class="box">
  <div class="coluna positivo">
    <h2>✅ Positivos</h2>
    <ul id="positivos"></ul>
  </div>

  <div class="coluna negativo">
    <h2>❌ Negativos</h2>
    <ul id="negativos"></ul>
  </div>
</div>

<script>
const input = document.getElementById("pdfInput");

// 🔥 lista de negativos
let arquivosNegativos = [];

input.addEventListener("change", async (event) => {

  document.getElementById("positivos").innerHTML = "";
  document.getElementById("negativos").innerHTML = "";
  arquivosNegativos = [];

  const arquivos = event.target.files;

  for (let file of arquivos) {
    const texto = await lerPDF(file);
    analisarTexto(texto, file.name, file);
  }
});

async function lerPDF(file) {
  const reader = new FileReader();

  return new Promise((resolve) => {
    reader.onload = async function () {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument(typedarray).promise;

      let texto = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const pagina = await pdf.getPage(i);
        const conteudo = await pagina.getTextContent();

        conteudo.items.forEach(item => {
          texto += item.str + " ";
        });

        texto += "\n";
      }

      resolve(texto.toLowerCase());
    };

    reader.readAsArrayBuffer(file);
  });
}

function analisarTexto(texto, nomeArquivo, fileAtual) {

  texto = texto.replace(/\s+/g, " ");

  const index = texto.indexOf("resultado do período");

  if (index !== -1) {

    const depois = texto.substring(index, index + 300);

    const valores = depois.match(/\(?\s*\d{1,3}(?:\.\d{3})*,\d{2}\s*\)?/g);

    if (valores && valores.length >= 4) {

      const saldoBruto = valores[3];
      const saldo = saldoBruto.replace(/\s+/g, "");

      const posSaldo = depois.indexOf(saldoBruto);
      const contexto = depois.substring(
        Math.max(0, posSaldo - 15),
        posSaldo + saldoBruto.length + 15
      );

      console.log(nomeArquivo + " → saldo:", saldo);
      console.log(nomeArquivo + " → contexto:", contexto);

      const ehNegativo =
        saldo.startsWith("(") ||
        saldo.endsWith(")") ||
        contexto.includes("(");

      if (ehNegativo) {
        adicionarLista("negativos", nomeArquivo, saldo);
        arquivosNegativos.push({ nome: nomeArquivo, file: fileAtual });
      } else {
        adicionarLista("positivos", nomeArquivo, saldo);
      }

    } else {
      console.log(nomeArquivo + " → erro: não encontrou 4 valores", valores);
    }

  } else {
    console.log(nomeArquivo + " → não encontrou 'resultado do período'");
  }
}

function adicionarLista(tipo, nome, saldo) {
  const ul = document.getElementById(tipo);
  const li = document.createElement("li");
  li.textContent = `${nome} → Saldo: ${saldo}`;
  ul.appendChild(li);
}

// 🔥 DOWNLOAD DOS NEGATIVOS
function baixarNegativos() {

  if (arquivosNegativos.length === 0) {
    alert("Nenhum PDF negativo encontrado.");
    return;
  }

  arquivosNegativos.forEach((item) => {
    const url = URL.createObjectURL(item.file);

    const a = document.createElement("a");
    a.href = url;
    a.download = item.nome;

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
  });
}
</script>

</body>
</html>
